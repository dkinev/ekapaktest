swagger: "2.0"
info:
  title: Ekapak Test API
  version: "1.0"

host: localhost:80
basePath: /api/v1

schemes:
  - http

paths:

  /products:
    get:
      summary: Get products list
      responses:
        200:
          description: OK
          schema:
            type: array
            items:
              $ref: '#/definitions/Product'

  /products/{id}:
    get:
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/Product'
        404:
          description: Not found

  /customers:
    post:
      summary: Create customer
      parameters:
        - in: body
          name: body
          schema:
            $ref: '#/definitions/CreateCustomer'
      responses:
        201:
          description: Created
        422:
          description: Validation error

  /orders:
    post:
      summary: Create order
      parameters:
        - in: body
          name: body
          schema:
            $ref: '#/definitions/CreateOrder'
      responses:
        201:
          description: Created
        422:
          description: Validation error
        429:
          description: Too many requests

  /orders/{id}:
    get:
      summary: Get order
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: OK
        404:
          description: Not found

  /orders/{id}/confirm:
    patch:
      summary: Confirm order
      responses:
        200:
          description: OK

  /orders/{id}/cancel:
    patch:
      summary: Cancel order
      responses:
        200:
          description: OK

definitions:

  Product:
    type: object
    properties:
      id:
        type: integer
      name:
        type: string
      sku:
        type: string
      price:
        type: number
      stock_quantity:
        type: integer
      category:
        type: string

  CreateCustomer:
    type: object
    required:
      - name
      - email
    properties:
      name:
        type: string
        example: John Doe
      email:
        type: string
        example: john@example.com
      phone:
        type: string
        example: "+123456789"

  CreateOrder:
    type: object
    required:
      - customer_id
      - items
    properties:
      customer_id:
        type: integer
        example: 1
      items:
        type: array
        items:
          type: object
          properties:
            product_id:
              type: integer
              example: 1
            quantity:
              type: integer
              example: 2
