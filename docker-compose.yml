version: '3.9'

services:
  nginx:
    image: nginx:alpine
    container_name: ekapak_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ekapak_app
    volumes:
      - ./:/var/www
    depends_on:
      - db
      - db_test
      - redis
    environment:
      DB_HOST: db
      DB_DATABASE: app
      DB_USERNAME: root
      DB_PASSWORD: root

      TEST_DB_HOST: db_test
      TEST_DB_DATABASE: app_test
      TEST_DB_USERNAME: root
      TEST_DB_PASSWORD: root

      REDIS_HOST: redis
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: ekapak_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

  db_test:
    image: mysql:8.0
    container_name: ekapak_db_test
    restart: always
    environment:
      MYSQL_DATABASE: app_test
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_test_data:/var/lib/mysql
    networks:
      - app-network

  redis:
    image: redis:7
    container_name: ekapak_redis
    ports:
      - "6379:6379"
    networks:
      - app-network

volumes:
  db_data:
  db_test_data:

networks:
  app-network:
